services:
  - type: web
    name: vid-tool-downloader
    env: python
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: export PATH="/opt/render/project/src/ffmpeg:$PATH" && gunicorn -c gunicorn_config.py -b 0.0.0.0:$PORT run:app
    envVars:
      - key: FLASK_ENV
        value: prod
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vidtool_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vidtool-redis
          type: redis
          property: connectionString

  - type: worker
    name: vid-tool-worker
    env: python
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: export PATH="/opt/render/project/src/ffmpeg:$PATH" && celery -A run.celery worker --loglevel=info
    envVars:
      - key: FLASK_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: vidtool_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vidtool-redis
          type: redis
          property: connectionString

databases:
  - name: vidtool_db
    plan: free

redis:
  - name: vidtool-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
