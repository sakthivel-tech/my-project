{% extends "base.html" %}

{% block content %}
<div class="glass-card">
    <h1 style="margin-bottom: 1.5rem; text-align: center;">Download Any Video</h1>
    <form id="url-form">
        <input type="url" id="url" name="url" placeholder="Paste video URL here (YouTube, Vimeo, etc.)" required>
        {% if current_user.is_authenticated %}
        <button type="submit" class="btn-primary" style="width: 100%;">Analyze Video</button>
        {% else %}
        <button type="submit" class="btn-primary" style="width: 100%;">Login to Download</button>
        {% endif %}
    </form>

    <div id="error-message" style="display: none; padding: 1rem; margin-top: 1rem; background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4757; border-radius: 8px; color: #ff4757; text-align: center;"></div>

    <div id="loader" style="display: none; text-align: center; margin-top: 2rem;">
        <div class="spinner"></div>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">Extracting available formats...</p>
    </div>

    <div id="format-selection" style="display: none; margin-top: 2rem;">
        <div style="display: flex; gap: 1.5rem; margin-bottom: 1.5rem;">
            <img id="video-thumbnail" src="" style="width: 150px; border-radius: 12px; object-fit: cover;">
            <div>
                <h3 id="video-title">Video Title</h3>
                <p id="video-duration" style="color: var(--text-muted);"></p>
            </div>
        </div>

        <h4 style="margin-bottom: 1rem;">Select Quality</h4>
        <div id="formats-list" style="display: grid; gap: 0.5rem;">
            <!-- Formats will be injected here -->
        </div>
    </div>
</div>


<style>
    .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid var(--glass-border);
        border-top: 4px solid var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    .format-item {
        padding: 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s;
    }

    .format-item:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--primary);
    }
</style>

<script>
    document.getElementById('url-form').onsubmit = async (e) => {
        e.preventDefault();
        {% if not current_user.is_authenticated %}
        window.location.href = "{{ url_for('auth.login') }}";
        return;
        {% endif %}

        const url = document.getElementById('url').value;
        const loader = document.getElementById('loader');
        const formatSelection = document.getElementById('format-selection');
        const errorMessage = document.getElementById('error-message');

        loader.style.display = 'block';
        formatSelection.style.display = 'none';
        errorMessage.style.display = 'none';

        try {
            const formData = new FormData();
            formData.append('url', url);
            formData.append('csrf_token', '{{ csrf_token() }}');

            const resp = await fetch('/get_formats', {
                method: 'POST',
                body: formData
            });

            const data = await resp.json();
            if (data.error) throw new Error(data.error);

            document.getElementById('video-title').textContent = data.title;
            document.getElementById('video-thumbnail').src = data.thumbnail;
            document.getElementById('video-duration').textContent = `Duration: ${Math.floor(data.duration / 60)}m ${data.duration % 60}s`;

            const list = document.getElementById('formats-list');
            list.innerHTML = '';

            data.formats.forEach(f => {
                const div = document.createElement('div');
                div.className = 'format-item';
                div.innerHTML = `
                <div>
                    <strong>${f.resolution}</strong> (${f.ext})
                    <div style="font-size: 0.8rem; color: var(--text-muted);">${f.filesize} MB</div>
                </div>
                <form action="/download" method="POST" class="download-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="url" value="${url}">
                    <input type="hidden" name="format_id" value="${f.format_id}">
                    <button type="submit" class="btn-primary">Download</button>
                </form>
            `;
                list.appendChild(div);
            });
            
            // Re-attach event listeners safely
            document.querySelectorAll('.download-form').forEach(form => {
                form.addEventListener('submit', function(e) {
                    const btn = this.querySelector('button');
                    btn.disabled = true;
                    btn.innerText = 'Starting...';
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerText = 'Download';
                    }, 5000);
                });
            });

            formatSelection.style.display = 'block';
        } catch (err) {
            errorMessage.textContent = err.message || "An error occurred fetching the video.";
            errorMessage.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    };
</script>
{% endblock %}
